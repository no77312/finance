services:
  - type: web
    name: position-circle-api
    runtime: node
    plan: starter
    region: singapore
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_FILE
        value: /var/data/store.json
    disk:
      name: position-circle-data
      mountPath: /var/data
      sizeGB: 1
