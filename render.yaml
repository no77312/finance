services:
  - type: web
    name: position-circle-api
    runtime: node
    plan: starter
    region: singapore
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_FILE
        value: /var/data/store.json
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: PRICE_REFRESH_TOKEN
        sync: false
    disk:
      name: position-circle-data
      mountPath: /var/data
      sizeGB: 1
